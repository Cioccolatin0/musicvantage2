<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Soundusic - Listen to any song, anytime" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Soundusic" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text y='.9em' font-size='60' x='20' fill='white'>♪</text></svg>" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <title>Soundusic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; }
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <audio id="soundusic-bg-audio" playsinline crossorigin="anonymous" preload="auto" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;" onerror="(() => {})()"></audio>
  <div id="yt-player" style="position:fixed;left:1px;bottom:1px;z-index:1;width:1px;height:1px;opacity:0.01;pointer-events:none;transition:all 0.3s ease"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
